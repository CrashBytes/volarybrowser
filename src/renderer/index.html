<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- Security Headers (CSP injected by HtmlWebpackPlugin) -->
  
  <title>Volary Browser</title>
  
  <style>
    /**
     * Critical CSS - Inlined for instant visual feedback
     * 
     * Design Philosophy:
     * - Zero layout shift on load
     * - Dark mode by default (matches brand, reduces eye strain)
     * - System font stack (no FOUT - Flash of Unstyled Text)
     */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 
                   'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 
                   'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #1a1a1a;
      color: #e0e0e0;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /**
     * Loading state - Displayed while React hydrates
     * 
     * Provides immediate visual feedback that application is initializing
     * Prevents jarring blank screen during cold start
     */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /**
     * Accessibility: Respect user's motion preferences
     * Users with vestibular disorders can disable animations
     */
    @media (prefers-reduced-motion: reduce) {
      .loading-spinner {
        animation: none;
        border-top-color: transparent;
        border-right-color: #6366f1;
      }
    }
  </style>
</head>
<body>
  <!-- React mount point -->
  <div id="root">
    <!-- Loading state displayed until React hydrates -->
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Initializing Volary Browser...</div>
    </div>
  </div>

  <!-- 
    Scripts injected by HtmlWebpackPlugin
    - Runtime chunk (webpack runtime)
    - Vendors chunk (React, Zustand, etc.)
    - App bundle (application code)
    
    defer attribute ensures DOM ready before script execution
  -->
</body>
</html>
