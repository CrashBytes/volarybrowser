name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    needs: lint-and-test
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build standalone
        run: npm run build:standalone

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(wc -c < dist/main.js)
          echo "main.js: $MAIN_SIZE bytes"
          if [ "$MAIN_SIZE" -gt 5242880 ]; then
            echo "WARNING: main.js exceeds 5MB"
          fi
